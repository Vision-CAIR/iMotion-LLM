# GF based iMotion-LLM, with conditional signal as query replacement of the original GameFormer
datasets:
  traj_align:
    dataset_path: '/ibex/project/c2278/felembaa/datasets/waymo/gameformer/training_30sep/*'
    filelabel: waymo_interactive
    processor:
      train:
        name: traj_train
        num_agents: 2
        obs_len: 11
        obs_pred_split_type: Fixed
        pred_len: 80
        traj_len: 91
        act: True
        act_json: False
        template_select: 0
        contrastive: False 
        random_select: False
        random_drop: False
        of_samples : False
  
  traj_align_valid:
    dataset_path: '/ibex/project/c2278/felembaa/datasets/waymo/gameformer/validation_30sep/*'
    filelabel: waymo_interactive
    processor:
      valid:
        name: "traj_eval"
        traj_len: 91
        obs_len: 11
        pred_len: 80
        num_agents: 2
        obs_pred_split_type: Fixed
        act: True
        template_select: 0
        new_eval: true
        # new_eval_mode: pred_only
        new_eval_mode: neg1
        agents_instructed: 0
    
model:
  lisa_like: True
  use_llama2_template: True
  smpl_instruct: True
  very_smpl_turn: False
  recon_loss_adapter: False
  recon_loss_llm: False
  img_token_num: 1
  # img_token_num: 357
  # img_token_num: 186 #94
  output_crossattn: False

  # output_crossattn: True
  # img_token_num: 16
  # gf_token_num: 356
  gf_token_num: 228
  # gf_token_num: 184 # 92
  freeze_gf: True
  freeze_gf_enc: True
  freeze_gf_dec: True
  act: true
  motion_act: False

  arch: gameformer_gpt
  end_sym: </s>
  lora_target_modules: all # 'all' or 'not_all', all will include extra projection layers but not all the layer
  low_resource: true
  max_txt_len: 150
  llama_model: "meta-llama/Llama-2-7b-hf"
  # llama_model: "ahxt/LiteLlama-460M-1T"
  lora: true
  lora_dropout: 0
  # lora_r: 512
  # lora_alpha: 64
  lora_r: 32
  lora_alpha: 64
  quant: 4
  rollouts: 6
  lora_bias: false
  gameformer_enc: true
  # gf_encoder_path: '/ibex/user/felembaa/gameformer_models/gf_7may_fullmap_act_smalldata/epochs_last.pth'
  # gf_encoder_path: '/ibex/project/c2278/felembaa/models/gameformer/cgf_23aug/epochs_29.pth'
  gf_encoder_path: '/ibex/project/c2278/felembaa/models/gameformer/gf_23aug/epochs_29.pth'
  gf_encoder_layers: 6
  gf_act_enc: False
  gf_act_dec: False
  full_map : false
  caption: true
  eval_only: true
  new_optimizer: False
  
run:
  resume_ckpt_path: "/ibex/project/c2278/felembaa/models/imotion/nov/imotion_1qtoken_gf_21nov_01/checkpoint_last.pth"
  # best_agg_metric: 1000
  # best_epoch: 1.704
  
  amp: False
  # batch_size_train: 100
  # batch_size_train: 64
  batch_size_train: 32
  # batch_size_train: 2
  batch_size_eval: 16
  device: cuda
  dist_url: env://
  iters_per_epoch: 50000 #4000 #640 #3262 #Adjust this
  # accum_grad_iters: 8
  # eval_iters_per_epoch: 8
  warmup_steps: 780
  evaluate_min_epoch: 0
  log_freq: 1
  lr_sched: linear_warmup_cosine_lr #check constant
  max_epoch: 20
  num_eval_figs: 0
  
  
  seed: 42
  task: image_text_pretrain
  # task: None
  train_splits: train
  # valid_splits: valid
  
  
  
  # warmup_steps: 25
  weight_decay: 0.01
  # weight_decay: 0.0
  world_size: 4
  num_workers: 4
  # world_size: 0
  # num_workers: 0
  
  init_lr: 1e-5
  # init_lr: 1e-5
  warmup_lr: 1e-6
  min_lr: 1e-6
  didnt_work_repeat: 0 
  # num_eval_batches: 8
  output_dir: /ibex/project/c2278/felembaa/models/imotion/nov/imotion_1qtoken_gf_21nov_01/eval #Adjust this
  job_name: 'temp'
  
  wandb_log: False
  save_model: False
  # distributed: False
  distributed: True
  # wandb_log: true
  # save_model: true

  evaluate: True
  evaluate_only: True